<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lung Cancer Staging System · 肺癌分期系统</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #eef5f8;
      --panel: #ffffff;
      --panel-soft: #f8fbfd;
      --border: #d7e5ec;
      --primary: #14506d;
      --primary-2: #2b86a7;
      --text: #203341;
      --muted: #667c89;
      --warn-bg: #fff8e8;
      --warn-border: #f0dca6;
      --warn-text: #6f5b22;
    }
    body {
      margin: 0;
      padding: 20px;
      background: linear-gradient(180deg, #f3f8fb 0%, var(--bg) 100%);
      color: var(--text);
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }
    .shell {
      max-width: 1320px;
      margin: 0 auto;
      background: var(--panel);
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 24px 60px rgba(19, 45, 64, 0.08);
    }
    .hero {
      background: linear-gradient(135deg, #0d4a6b 0%, #1f6e8f 58%, #3a95ab 100%);
      color: #fff;
      padding: 28px 30px 22px;
      position: relative;
    }
    .hero-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(255,255,255,0.14);
      font-size: 0.82rem;
      font-weight: 700;
    }
    .lang-switch {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.16);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.25);
    }
    .print-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.22);
    }
    .lang-switch:hover, .print-btn:hover { background: rgba(255,255,255,0.24); }
    h1 {
      margin: 14px 0 0;
      font-size: 2.08rem;
      font-weight: 900;
      letter-spacing: 0.2px;
    }
    .subtitle {
      margin-top: 12px;
      max-width: 1100px;
      line-height: 1.78;
      font-size: 0.98rem;
      color: rgba(255,255,255,0.96);
    }
    .content { padding: 24px 26px 32px; }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .info-card {
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px 16px;
    }
    .info-card h3 {
      margin: 0 0 7px;
      color: var(--primary);
      font-size: 0.93rem;
    }
    .info-card p {
      margin: 0;
      color: #445966;
      font-size: 0.86rem;
      line-height: 1.65;
    }
    .tabs {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .tab-btn {
      border: none;
      border-radius: 999px;
      padding: 11px 18px;
      background: #edf5f8;
      color: #1f5773;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.93rem;
    }
    .tab-btn.active {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 8px 18px rgba(20, 80, 109, 0.18);
    }
    .page { display: none; }
    .page.active { display: block; }
    .page.page-nsclc .panel,
    .page.page-nsclc .summary-strip,
    .page.page-nsclc .box,
    .page.page-nsclc .result-card {
      box-shadow: inset 0 0 0 1px rgba(39, 123, 160, 0.04);
    }
    .page.page-sclc .panel,
    .page.page-sclc .summary-strip,
    .page.page-sclc .box,
    .page.page-sclc .result-card {
      box-shadow: inset 0 0 0 1px rgba(93, 93, 166, 0.05);
    }
    .page.page-nsclc .panel { border-top: 4px solid #2d83a6; }
    .page.page-sclc .panel { border-top: 4px solid #6b63a7; }
    .summary-strip {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 10px;
      margin: 0 0 18px;
    }
    .summary-pill {
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 10px 12px;
      min-height: 72px;
    }
    .summary-pill .k {
      font-size: 0.72rem;
      font-weight: 800;
      color: #6a8290;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .summary-pill .v {
      font-size: 0.96rem;
      font-weight: 800;
      color: var(--primary);
      line-height: 1.45;
    }
    .grid {
      display: grid;
      grid-template-columns: 1.22fr 1fr;
      gap: 22px;
      align-items: start;
    }
    .panel {
      background: #fbfdfe;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 18px;
    }
    .panel h2 {
      margin: 0 0 14px;
      color: var(--primary);
      font-size: 1.08rem;
    }
    .section-block {
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #fff;
      overflow: hidden;
    }
    .section-block:first-of-type { margin-top: 0; }
    .section-summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
      padding: 14px 16px;
      background: #f2f8fb;
      color: #175d7d;
      font-weight: 800;
      font-size: 0.96rem;
    }
    .section-summary::-webkit-details-marker { display: none; }
    .section-toggle {
      font-size: 0.8rem;
      color: #678290;
      font-weight: 700;
    }
    .section-body { padding: 16px; }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px 16px;
    }
    .field.full { grid-column: 1 / -1; }
    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.78rem;
      font-weight: 800;
      color: #1d6182;
      text-transform: uppercase;
      letter-spacing: 0.25px;
    }
    .field select, .field input {
      width: 100%;
      border-radius: 15px;
      border: 1.5px solid #cfdee6;
      padding: 12px 14px;
      font-size: 0.94rem;
      background: #fff;
      color: var(--text);
      outline: none;
    }
    .field select:focus, .field input:focus {
      border-color: var(--primary-2);
      box-shadow: 0 0 0 4px rgba(43, 134, 167, 0.12);
    }
    .hint {
      margin-top: 6px;
      font-size: 0.81rem;
      line-height: 1.55;
      color: var(--muted);
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: #f1f8fb;
      border: 1px solid var(--border);
      color: #32505f;
      font-size: 0.82rem;
    }
    .result-card {
      background: linear-gradient(135deg, #edf7fb 0%, #e3f0f6 100%);
      border: 1px solid #cadde7;
      border-radius: 24px;
      padding: 20px 20px 18px;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }
    .result-card::after {
      content: '';
      position: absolute;
      right: -40px;
      top: -40px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      pointer-events: none;
    }
    .result-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }
    .result-tag {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .severity-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(17, 63, 86, 0.08);
      color: #285065;
      font-weight: 800;
      font-size: 0.8rem;
    }
    .stage-main {
      font-size: 3.6rem;
      line-height: 1;
      color: #113e56;
      font-weight: 900;
      margin: 3px 0 10px;
      position: relative;
      z-index: 1;
    }
    .stage-desc {
      font-size: 0.96rem;
      line-height: 1.72;
      color: #375361;
      position: relative;
      z-index: 1;
    }
    .result-card.stage-severity-1 { background: linear-gradient(135deg, #e8f7ef 0%, #ddf2e6 100%); border-color: #b9dfc7; }
    .result-card.stage-severity-2 { background: linear-gradient(135deg, #f4fae5 0%, #ecf4d8 100%); border-color: #d4e6a1; }
    .result-card.stage-severity-3 { background: linear-gradient(135deg, #fff4da 0%, #fde9c2 100%); border-color: #f0cf86; }
    .result-card.stage-severity-4 { background: linear-gradient(135deg, #ffe9da 0%, #f9d4bf 100%); border-color: #ecb48f; }
    .result-card.stage-severity-5 { background: linear-gradient(135deg, #ffe1df 0%, #f6c8c3 100%); border-color: #e59c95; }
    .result-card.stage-severity-0 { background: linear-gradient(135deg, #eef2f5 0%, #e2e8ee 100%); border-color: #cfd8e2; }
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
      position: relative;
      z-index: 1;
    }
    .metric {
      border-radius: 16px;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(20, 79, 108, 0.1);
      padding: 11px 12px;
    }
    .metric .k {
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      color: #68808d;
      margin-bottom: 5px;
    }
    .metric .v {
      font-size: 1.08rem;
      font-weight: 800;
      color: var(--primary);
    }
    .box {
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px 16px;
      margin-top: 12px;
      color: #35515f;
      font-size: 0.92rem;
      line-height: 1.7;
    }
    .box h3 {
      margin: 0 0 8px;
      font-size: 0.96rem;
      color: var(--primary);
    }
    .box ul { margin: 8px 0 0; padding-left: 20px; }
    .box li { margin: 8px 0; }
    .path-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 10px;
    }
    .path-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 13px;
      min-height: 100%;
    }
    .path-card.primary { border-color: rgba(36, 124, 159, 0.38); background: #f6fbfe; }
    .path-card.warning { border-color: rgba(220, 153, 81, 0.38); background: #fffaf2; }
    .path-card h4 {
      margin: 0 0 8px;
      font-size: 0.88rem;
      color: #144d6d;
    }
    .path-card p {
      margin: 0;
      font-size: 0.86rem;
      line-height: 1.62;
      color: #39515f;
    }
    .timeline {
      display: grid;
      gap: 12px;
      margin-top: 10px;
    }
    .time-step {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 12px;
      align-items: start;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 13px;
    }
    .time-step .time {
      font-size: 0.82rem;
      font-weight: 900;
      color: #175c7c;
      text-transform: uppercase;
      letter-spacing: 0.2px;
    }
    .time-step .desc {
      font-size: 0.87rem;
      line-height: 1.65;
      color: #39515f;
    }
    .warn {
      background: var(--warn-bg);
      border-color: var(--warn-border);
      color: var(--warn-text);
    }
    .refs {
      margin-top: 22px;
      border-radius: 20px;
      background: #f9fbfc;
      border: 1px solid var(--border);
      padding: 16px 18px;
      font-size: 0.88rem;
      line-height: 1.72;
      color: #405965;
    }
    .refs h3 {
      margin: 0 0 8px;
      color: var(--primary);
      font-size: 0.96rem;
    }
    .refs ul { margin: 8px 0 0; padding-left: 20px; }
    .refs li { margin: 7px 0; }
    .footer {
      margin-top: 18px;
      text-align: right;
      color: #728592;
      font-size: 0.8rem;
    }
    @media print {
      body {
        background: #fff;
        padding: 0;
      }
      .shell {
        border: none;
        box-shadow: none;
      }
      .lang-switch,
      .print-btn,
      .tabs,
      .info-grid {
        display: none !important;
      }
      .page:not(.active) { display: none !important; }
      .section-block,
      .result-card,
      .box,
      .summary-pill,
      .path-card,
      .time-step {
        break-inside: avoid;
      }
    }
    a { color: #0c6991; }
    @media (max-width: 1040px) {
      .grid, .info-grid, .metrics, .form-grid, .summary-strip, .path-grid { grid-template-columns: 1fr; }
      .time-step { grid-template-columns: 1fr; }
      .stage-main { font-size: 2.8rem; }
      body { padding: 10px; }
      .hero, .content { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <div class="hero-top">
        <div class="badge" id="heroBadge"></div>
        <div class="toolbar-actions">
          <button class="print-btn" id="printBtn"></button>
          <button class="lang-switch" id="langSwitch"></button>
        </div>
      </div>
      <h1 id="heroTitle"></h1>
      <div class="subtitle" id="heroSubtitle"></div>
    </div>

    <div class="content">
      <div class="info-grid" id="infoGrid"></div>
      <div class="tabs">
        <button class="tab-btn active" data-tab="nsclc" id="tabNsclc"></button>
        <button class="tab-btn" data-tab="sclc" id="tabSclc"></button>
      </div>

      <section class="page page-nsclc active" id="page-nsclc">
        <div class="summary-strip" id="nsCaseSummary"></div>
        <div class="grid">
          <div class="panel">
            <h2 id="nsPanelTitle"></h2>
            <div id="nsSections"></div>
          </div>
          <div>
            <div class="result-card stage-severity-0" id="nsResultCard">
              <div class="result-head">
                <div>
                  <div class="result-tag" id="nsResultTag"></div>
                </div>
                <div class="severity-chip" id="nsSeverityChip"></div>
              </div>
              <div class="stage-main" id="nsStage"></div>
              <div class="stage-desc" id="nsSummary"></div>
              <div class="metrics">
                <div class="metric"><div class="k" id="metricT"></div><div class="v" id="nsTValue"></div></div>
                <div class="metric"><div class="k" id="metricN"></div><div class="v" id="nsNValue"></div></div>
                <div class="metric"><div class="k" id="metricM"></div><div class="v" id="nsMValue"></div></div>
                <div class="metric"><div class="k" id="metricResect"></div><div class="v" id="nsResectValue"></div></div>
              </div>
            </div>
            <div class="box warn" id="nsReason"></div>
            <div class="box" id="nsPlan"></div>
            <div class="box" id="nsFollow"></div>
          </div>
        </div>
      </section>

      <section class="page page-sclc" id="page-sclc">
        <div class="summary-strip" id="scCaseSummary"></div>
        <div class="grid">
          <div class="panel">
            <h2 id="scPanelTitle"></h2>
            <div id="scSections"></div>
          </div>
          <div>
            <div class="result-card stage-severity-0" id="scResultCard">
              <div class="result-head">
                <div>
                  <div class="result-tag" id="scResultTag"></div>
                </div>
                <div class="severity-chip" id="scSeverityChip"></div>
              </div>
              <div class="stage-main" id="scStage"></div>
              <div class="stage-desc" id="scSummary"></div>
              <div class="metrics">
                <div class="metric"><div class="k" id="scMetricT"></div><div class="v" id="scTValue"></div></div>
                <div class="metric"><div class="k" id="scMetricN"></div><div class="v" id="scNValue"></div></div>
                <div class="metric"><div class="k" id="scMetricM"></div><div class="v" id="scMValue"></div></div>
                <div class="metric"><div class="k" id="scMetricSimple"></div><div class="v" id="scSimpleValue"></div></div>
              </div>
            </div>
            <div class="box warn" id="scReason"></div>
            <div class="box" id="scPlan"></div>
            <div class="box" id="scFollow"></div>
          </div>
        </div>
      </section>

      <div class="refs">
        <h3 id="refsTitle"></h3>
        <ul id="refsList"></ul>
      </div>
      <div class="footer" id="footerText"></div>
    </div>
  </div>

  <script>
    const I18N = {
      zh: {
        langButton: 'English',
        printButton: '打印当前页',
        heroBadge: '🫁 核校更新版 · TNM第9版 · 双语一键切换',
        heroTitle: '肺癌分期与治疗随访建议系统（核校更新版）',
        heroSubtitle: '本核校更新版用于肺癌分期辅助判读、治疗路径梳理与随访节奏提示：内置中文 / English 一键切换，区分 NSCLC（非小细胞肺癌）与 SCLC（小细胞肺癌）双页面。分期主逻辑已由第8版升级为 IASLC / UICC / AJCC 第9版肺癌 TNM（2025 起实施），纳入 N2a / N2b 与 M1c1 / M1c2，并同步更新 NSCLC 与 SCLC 近年指南中的关键治疗和随访要点。本工具仍仅供临床参考、教学与流程设计，不替代 MDT（多学科团队）和正式诊疗决策。',
        infoCards: [
          { title: '双语模式', body: '支持中英文一键切换，便于门诊沟通、教学展示与国际交流。' },
          { title: 'TNM 第9版', body: '输入肿瘤大小、侵犯特征、N2a/N2b 与 M1c1/M1c2 后，自动生成第9版 TNM 与总分期。' },
          { title: '更新路径', body: '按早期、围术期、不可切除局晚期、晚期分别给出治疗路径提示，并强调分子检测与 MDT。' },
          { title: '更新随访', body: '纳入根治治疗后 CT 随访、系统治疗中疗效评估，以及 SCLC 常规脑 MRI 监测。' }
        ],
        tabNsclc: 'NSCLC 页面（非小细胞肺癌）',
        tabSclc: 'SCLC 页面（小细胞肺癌）',
        summaryLabels: {
          pathology: '病理类型',
          basis: '分期基础',
          stage: '当前分期',
          ecog: 'ECOG',
          driver: '驱动基因',
          pdl1: 'PD-L1',
          simple: '简化分期',
          brain: '脑 MRI'
        },
        nsPanelTitle: 'NSCLC（非小细胞肺癌）输入区',
        scPanelTitle: 'SCLC（小细胞肺癌）输入区',
        nsResultTag: 'NSCLC（非小细胞肺癌）自动输出',
        scResultTag: 'SCLC（小细胞肺癌）自动输出',
        metricT: 'T（原发肿瘤）',
        metricN: 'N（淋巴结）',
        metricM: 'M（远处转移）',
        metricResect: '切除性',
        scMetricSimple: '简化分期（局限期/广泛期）',
        refsTitle: '参考依据（用于系统设计，不替代正式指南全文）',
        footerText: '说明：本工具为核校更新后的临床参考、教学与流程设计工具，不替代 MDT（多学科团队）讨论、影像判读、病理结论、患者意愿评估或正式临床决策。',
        sectionTitles: {
          basic: '一、基础设置',
          tnm: '二、TNM 关键字段',
          route: '三、治疗路径关键字段'
        },
        nsSummary: (basis, t, n, m, stage) => `${basis} · NSCLC（非小细胞肺癌）· 自动生成 <strong>${t}${n}${m}</strong>，当前总分期为 <strong>${stage}</strong>。`,

    const state = {

      },

    const tOrder = ['Tis','T1mi','T1a','T1b','T1c','T2a','T2b','T3','T4'];
    const $ = id => document.getElementById(id);

    function maxT(list) {
      return list.reduce((best, item) => tOrder.indexOf(item) > tOrder.indexOf(best) ? item : best, list[0]);
    }
    function sizeToT(size) {
      if (size > 7) return 'T4';
      if (size > 5) return 'T3';
      if (size > 4) return 'T2b';
      if (size > 3) return 'T2a';
      if (size > 2) return 'T1c';
      if (size > 1) return 'T1b';
      return 'T1a';
    }

    function computeStage(t, n, m) {
  // IASLC / UICC / AJCC 9th edition lung TNM stage grouping.
  if (m === 'M1c1' || m === 'M1c2') return 'IVB';
  if (m === 'M1a' || m === 'M1b') return 'IVA';
  if (m !== 'M0') return 'Needs review';
  if (t === 'Tis' && n === 'N0') return '0';
  if ((t === 'T1mi' || t === 'T1a') && n === 'N0') return 'IA1';
  if (t === 'T1b' && n === 'N0') return 'IA2';
  if (t === 'T1c' && n === 'N0') return 'IA3';
  if (t === 'T2a' && n === 'N0') return 'IB';
  if ((isT1(t) && n === 'N1') || (t === 'T2b' && n === 'N0')) return 'IIA';
  if ((t === 'T2a' && n === 'N1') || (isT1(t) && n === 'N2a') || (t === 'T2b' && n === 'N1') || (t === 'T3' && n === 'N0')) return 'IIB';
  if ((isT1(t) && n === 'N2b') || (isT2(t) && n === 'N2a') || (t === 'T3' && (n === 'N1' || n === 'N2a')) || (t === 'T4' && (n === 'N0' || n === 'N1'))) return 'IIIA';
  if ((isT1(t) && n === 'N3') || (isT2(t) && (n === 'N2b' || n === 'N3')) || (t === 'T3' && n === 'N2b') || (t === 'T4' && (n === 'N2a' || n === 'N2b'))) return 'IIIB';
  if ((t === 'T3' || t === 'T4') && n === 'N3') return 'IIIC';
  return 'Needs review';
}

    function calcT(data) {
      if (data.specialT) {
        return {
          t: data.specialT,
          reason: state.lang === 'zh' ? `特殊病灶直接定义为 ${data.specialT}` : `Special lesion directly defines T as ${data.specialT}`
        };
      }
      const base = sizeToT(Number(data.size || 0));
      const list = [base];
      const parts = [state.lang === 'zh' ? `按肿瘤最大径 ${data.size} cm 计算基础 T 值：${base}` : `Base T from maximum tumor diameter ${data.size} cm: ${base}`];
      if (data.t2 === 'T2') { list.push('T2a'); parts.push(state.lang === 'zh' ? '存在 T2 升级特征' : 'T2-upgrading feature present'); }
      if (data.t3 === 'T3') { list.push('T3'); parts.push(state.lang === 'zh' ? '存在 T3 升级特征' : 'T3-upgrading feature present'); }
      if (data.t4 === 'T4') { list.push('T4'); parts.push(state.lang === 'zh' ? '存在 T4 升级特征' : 'T4-upgrading feature present'); }
      return { t: maxT(list), reason: parts.join(state.lang === 'zh' ? '；' : '; ') };
    }

    function basisText(side) {
      const lang = I18N[state.lang];
      if (side === 'ns') return state.ns.basis === 'clinical' ? lang.nsBasisClinical : lang.nsBasisPathologic;

    }

      };
      return map[state.lang][state.ns.resectability];
    }

    function pathologyText(side) {
      const field = side === 'ns' ? NS_SCHEMA[0].fields[1] : SC_SCHEMA[0].fields[1];
      const value = side === 'ns' ? state.ns.pathology : state.sc.pathology;
      const option = field.options.find(o => o.value === value);
      return option ? option[state.lang] : value;
    }
    function driverText() {
      const field = NS_SCHEMA[2].fields[0];
      const option = field.options.find(o => o.value === state.ns.driver);
      return option ? option[state.lang] : state.ns.driver;
    }
    function pdl1Text() {
      const field = NS_SCHEMA[2].fields[1];
      const option = field.options.find(o => o.value === state.ns.pdl1);

    function brainText() {
      const field = SC_SCHEMA[2].fields[0];
      const option = field.options.find(o => o.value === state.sc.brain);
      return option ? option[state.lang] : state.sc.brain;
    }
    function symptomText() {
      const field = SC_SCHEMA[2].fields[1];
      const option = field.options.find(o => o.value === state.sc.symptoms);
      return option ? option[state.lang] : state.sc.symptoms;
    }

    function simpleSclcStage() {
      if (state.sc.m !== 'M0') return I18N[state.lang].extensive;
      return state.sc.limited === 'yes' ? I18N[state.lang].limited : I18N[state.lang].extensive;
    }

    function stageSeverity(stage) {
      if (['0','IA1','IA2','IA3'].includes(stage)) return 1;
      if (['IB','IIA'].includes(stage)) return 2;
      if (['IIB','IIIA'].includes(stage)) return 3;
      if (['IIIB','IIIC'].includes(stage)) return 4;
      if (['IVA','IVB'].includes(stage)) return 5;
      return 0;
    }

    function renderSummaryStrip(targetId, items) {

    }

    }

    function nsPlan(stage) {

    cards.push({ title: lang === 'zh' ? '术后分子分型' : 'Postoperative biomarkers', body: lang === 'zh' ? '腺癌、腺鳞癌及非鳞 NSCLC 建议完善 NGS 或等效检测；可操作驱动阳性者需评估相应辅助靶向治疗适应证。' : 'Adenocarcinoma, adenosquamous and non-squamous NSCLC should undergo broad molecular testing; actionable driver-positive disease requires assessment for adjuvant targeted therapy eligibility.' });
  } else if (['IIB','IIIA'].includes(stage)) {
    cards.push({ tone: 'primary', title: lang === 'zh' ? 'MDT 与围术期治疗' : 'MDT and perioperative treatment', body: lang === 'zh' ? `当前切除性评估为“${resectText()}”。可切除或边界可切除病例建议 MDT 讨论，结合 N2a/N2b、肿瘤负荷、肺功能和驱动基因/PD-L1 状态，选择新辅助化疗、免疫联合化疗、靶向治疗或手术后辅助治疗路径。` : `Current resectability is “${resectText()}”. For resectable or borderline disease, MDT should integrate N2a/N2b status, tumor burden, pulmonary reserve, driver alterations and PD-L1 to select neoadjuvant chemotherapy, chemoimmunotherapy, targeted therapy, surgery, and/or adjuvant therapy.` });
    cards.push({ title: lang === 'zh' ? '不可切除转换' : 'If unresectable', body: lang === 'zh' ? '若评估为不可切除，应转入局晚期根治性放化疗路径，并提前确认 EGFR/ALK 等驱动基因和免疫治疗适用性。' : 'If unresectable, move to definitive locally advanced chemoradiotherapy pathways and clarify EGFR/ALK and immunotherapy suitability early.' });
  } else if (['IIIB','IIIC'].includes(stage)) {
    cards.push({ tone: 'primary', title: lang === 'zh' ? '不可切除局晚期路径' : 'Unresectable locally advanced pathway', body: lang === 'zh' ? '多数 IIIB/IIIC 属于不可切除局晚期 NSCLC，标准主线通常为同步含铂放化疗；无法耐受同步者可采用序贯方案。治疗前需完成 PET-CT、脑 MRI、纵隔分期、肺功能和器官功能评估。' : 'Most stage IIIB/IIIC cases are unresectable locally advanced NSCLC. Concurrent platinum-based chemoradiotherapy is generally preferred; sequential treatment may be used when concurrent treatment is not tolerated. Complete PET-CT, brain MRI, mediastinal staging, pulmonary and organ-function assessment before treatment.' });
    cards.push({ title: lang === 'zh' ? '巩固治疗' : 'Consolidation', body: lang === 'zh' ? '放化疗后未进展者，应根据驱动基因和禁忌证评估巩固治疗：无免疫禁忌且适合者考虑 durvalumab；EGFR exon19del / L858R 阳性且符合条件者应评估奥希替尼巩固路径。' : 'If there is no progression after chemoradiotherapy, assess consolidation according to biomarkers and contraindications: durvalumab when immunotherapy-appropriate, and osimertinib for eligible EGFR exon19del / L858R disease.' });
  } else if (['IVA','IVB'].includes(stage)) {
    cards.push({ tone: 'primary', title: lang === 'zh' ? '晚期系统治疗' : 'Advanced systemic therapy', body: lang === 'zh' ? '晚期 NSCLC 应先完成充分分子分型与 PD-L1 评估，再根据 EGFR、ALK、ROS1、BRAF、KRAS G12C、METex14、RET、NTRK、HER2、EGFR exon20、NRG1 等可操作异常、PD-L1 水平、症状负荷和转移范围选择靶向治疗、免疫治疗、免疫联合化疗、化疗或最佳支持治疗。' : 'Advanced NSCLC should start with broad molecular profiling and PD-L1 assessment, then select targeted therapy, immunotherapy, chemoimmunotherapy, chemotherapy, or best supportive care based on actionable alterations including EGFR, ALK, ROS1, BRAF, KRAS G12C, METex14, RET, NTRK, HER2, EGFR exon20, NRG1, PD-L1, symptom burden and disease extent.' });
    cards.push({ title: lang === 'zh' ? '局部整合治疗' : 'Integrated local therapy', body: lang === 'zh' ? '对寡转移、寡进展或局部症状明显者，可在系统治疗基础上结合放疗、消融、手术或其他局部治疗。' : 'For oligometastatic, oligoprogressive or symptom-dominant disease, combine systemic therapy with radiotherapy, ablation, surgery or other local therapy when appropriate.' });

    cards.push({ tone: 'warning', title: lang === 'zh' ? '人工复核' : 'Manual review', body: lang === 'zh' ? '当前 TNM 组合需人工复核，并结合影像、病理和临床状态做最终治疗决策。' : 'This TNM combination requires manual review together with imaging, pathology, and clinical status.' });

  return renderPathCards(I18N[state.lang].planTitle, cards);
}

    function nsFollow(stage) {

  if (['0','IA1','IA2','IA3','IB','IIA','IIB','IIIA'].includes(stage)) {
    items.push({ time: lang === 'zh' ? '根治后 0–2 年' : '0–2 years after curative treatment', desc: lang === 'zh' ? '建议每 6 个月进行病史、体检和胸部 CT（建议包含肾上腺范围；是否增强按临床场景决定），用于发现复发。' : 'History, physical examination, and chest CT every 6 months; include the adrenals when appropriate, with contrast individualized by clinical context.' });
    items.push({ time: lang === 'zh' ? '2 年后' : 'After year 2', desc: lang === 'zh' ? '建议每年 1 次胸部低剂量 CT 或胸部 CT，用于发现第二原发肺癌和晚期复发。' : 'Annual low-dose chest CT or chest CT is recommended to detect second primary lung cancers and late recurrence.' });

  } else if (['IIIB','IIIC'].includes(stage)) {
    items.push({ time: lang === 'zh' ? '放化疗后 0–3 年' : '0–3 years after chemoradiotherapy', desc: lang === 'zh' ? '建议每 3–6 个月复评 1 次，重点评估胸部 CT、治疗反应、残余病灶变化和复发风险；根据分期和症状决定脑 MRI、上腹部影像或 PET/CT。' : 'Reassess every 3–6 months with chest CT, response status, residual disease and recurrence risk; brain MRI, upper abdominal imaging or PET/CT should be symptom- and stage-directed.' });

    items.push({ time: lang === 'zh' ? '人工复核' : 'Manual review', desc: lang === 'zh' ? '当前组合建议人工复核后再给出个体化随访频率。' : 'This combination should be manually reviewed before assigning individualized surveillance intervals.' });
  }
  items.push({ time: lang === 'zh' ? '专项' : 'Special', desc: lang === 'zh' ? '靶向治疗初期建议每 4–8 周评估疗效与不良反应；免疫治疗期间需常规监测甲状腺功能、肝功能、肾上腺、垂体、肺炎及其他免疫相关不良事件。' : 'Early during targeted therapy, reassess efficacy and toxicity every 4–8 weeks; during immunotherapy, routinely monitor thyroid, liver, adrenal, pituitary, pneumonitis, and other immune-related toxicities.' });
  return renderTimeline(I18N[state.lang].followTitle, items);
}

    function scPlan(stage, simple) {
  const lang = state.lang;
  const pathology = pathologyText('sc');
  const cards = [];
  if (simple === I18N[state.lang].limited) {
    cards.push({ tone: 'primary', title: lang === 'zh' ? '首选治疗' : 'Preferred treatment', body: lang === 'zh' ? '局限期 SCLC 通常以同步含铂依托泊苷放化疗为标准主线；极少数 very early 且可切除病例，可在 MDT 评估后讨论手术 + 术后化疗路径。' : 'Limited-stage SCLC is generally treated with concurrent platinum-etoposide chemoradiotherapy; only a very small subset of very early resectable cases may be considered for surgery plus postoperative chemotherapy after MDT review.' });
    cards.push({ title: lang === 'zh' ? '放化疗后巩固' : 'Post-chemoradiotherapy consolidation', body: lang === 'zh' ? '同步含铂化疗和放疗后未进展且条件合适者，应评估 durvalumab 巩固治疗；对获得良好缓解者，同时讨论 PCI（预防性颅脑照射）或规律脑 MRI 监测。' : 'If there is no progression after concurrent platinum-based chemotherapy and radiation, assess durvalumab consolidation; in good responders, discuss PCI versus structured brain MRI surveillance.' });
  } else {
    cards.push({ tone: 'primary', title: lang === 'zh' ? '首选治疗' : 'Preferred treatment', body: lang === 'zh' ? '广泛期 SCLC 在无免疫禁忌时，应优先考虑含铂（卡铂或顺铂）+ 依托泊苷 + PD-L1 抑制剂（atezolizumab 或 durvalumab），随后免疫维持；有禁忌时采用含铂依托泊苷或个体化方案。' : 'For extensive-stage SCLC without immunotherapy contraindications, use platinum (carboplatin or cisplatin) plus etoposide plus a PD-L1 inhibitor (atezolizumab or durvalumab), followed by maintenance immunotherapy; use platinum-etoposide or individualized therapy when contraindicated.' });
    cards.push({ title: lang === 'zh' ? '局部和支持治疗' : 'Local and supportive care', body: lang === 'zh' ? '对症状性病灶、脑转移、骨转移、上腔静脉综合征或胸部残余病灶，应评估姑息放疗、局部控制、骨保护和支持治疗。' : 'Symptomatic lesions, brain metastases, bone metastases, superior vena cava syndrome, or thoracic residual disease should prompt palliative radiotherapy, local control, bone-directed care, and supportive care.' });
  }
  cards.push({ title: lang === 'zh' ? '病理与分期' : 'Pathology and staging', body: lang === 'zh' ? `当前病理类型为 ${pathology}；当前 TNM 第9版总分期为 ${stage}，简化分期为 ${simple}。` : `Current pathology is ${pathology}; TNM 9th-edition stage is ${stage}, and the simplified stage is ${simple}.` });
  cards.push({ title: lang === 'zh' ? '治疗前评估' : 'Pretreatment assessment', body: lang === 'zh' ? `脑 MRI（优先）/头颅增强 CT 状态为 ${brainText()}；症状负荷为 ${symptomText()}。正式路径中还应同步关注器官功能、骨髓储备、低钠血症、神经内分泌相关综合征和并发症风险。` : `Brain MRI (preferred) / contrast head CT status is ${brainText()} and symptom burden is ${symptomText()}. Formal planning should also address organ function, marrow reserve, hyponatremia, neuroendocrine syndromes, and complication risk.` });
  if (Number(state.sc.ecog) >= 3) cards.push({ tone: 'warning', title: lang === 'zh' ? '体能状态修正' : 'Performance adjustment', body: lang === 'zh' ? 'ECOG PS 较差时，应进一步强化支持治疗、症状缓解和治疗强度个体化调整。' : 'Poor ECOG PS should increase emphasis on supportive care, symptom relief, and individualized treatment intensity.' });
  return renderPathCards(I18N[state.lang].planTitle, cards);
}

    function scFollow(simple) {
  const lang = state.lang;
  const items = [];
  if (simple === I18N[state.lang].limited) {
    items.push({ time: lang === 'zh' ? '治疗后 0–2 年' : '0–2 years after treatment', desc: lang === 'zh' ? '建议每 2–3 个月复诊 1 次，评估病史、体检、胸部/上腹部 CT、症状变化、复发风险和治疗毒性。' : 'Follow up every 2–3 months with history, physical examination, chest/upper abdominal CT, symptom review, recurrence risk and toxicity assessment.' });
    items.push({ time: lang === 'zh' ? '2 年后' : 'After year 2', desc: lang === 'zh' ? '可逐步改为每 3–6 个月，长期稳定后按年评估，并持续关注第二原发肺癌和治疗后并发症。' : 'Intervals may be widened to every 3–6 months, then annually after long-term stability, while watching for second primary lung cancer and late complications.' });
  } else {
    items.push({ time: lang === 'zh' ? '治疗中' : 'On treatment', desc: lang === 'zh' ? '通常每 2–3 个周期评估疗效；获得缓解或稳定后，继续密切追踪胸部、腹部、脑部和症状变化，并按治疗方案调整影像节奏。' : 'Efficacy is commonly assessed every 2–3 cycles; after response or stabilization, continue close thoracic, abdominal, brain and symptom surveillance with imaging intervals adjusted to treatment.' });
  }
  items.push({ time: lang === 'zh' ? '脑部监测' : 'Brain surveillance', desc: lang === 'zh' ? 'SCLC 随访建议优先采用脑 MRI；通常第 1 年每 3–4 个月、第 2 年每 6 个月进行脑 MRI（或头颅增强 CT），无论是否接受 PCI，之后按临床需要。' : 'Brain MRI is preferred for SCLC surveillance; brain MRI or contrast-enhanced head CT is commonly performed every 3–4 months in year 1 and every 6 months in year 2 regardless of PCI status, then as clinically indicated.' });
  items.push({ time: lang === 'zh' ? 'PCI / 脑转移后' : 'After PCI / brain metastases', desc: lang === 'zh' ? '接受 PCI 或脑转移局部治疗后，应持续进行神经认知、神经系统症状和脑 MRI 监测；脑转移局部治疗后前 1 年常每 2–3 个月复查脑 MRI，其后每 3–6 个月。' : 'After PCI or local therapy for brain metastases, continue neurocognitive, neurologic symptom and brain MRI monitoring; after local brain-metastasis therapy, MRI is often repeated every 2–3 months in year 1 and then every 3–6 months.' });
  items.push({ time: lang === 'zh' ? '免疫治疗中' : 'During immunotherapy', desc: lang === 'zh' ? '建议每 2–3 个周期评估疗效，同时常规监测甲状腺功能、肝功能、肺炎表现、内分泌异常及其他免疫相关不良反应。' : 'Reassess efficacy every 2–3 cycles while monitoring thyroid function, liver function, pneumonitis signals, endocrine toxicity, and other immune-related adverse events.' });
  return renderTimeline(I18N[state.lang].followTitle, items);
}

    function renderField(field, side) {
      const lang = state.lang;
      let effectiveField = field;
      if (side === 'ns' && field.id === 'specialT') {
        const baseOptions = [{ value: '', zh: '常规浸润性病灶', en: 'Conventional invasive lesion' }];
        if (['adenocarcinoma', 'squamous'].includes(state.ns.pathology)) {
          baseOptions.push({ value: 'Tis', zh: '原位病变（Tis；腺癌原位或鳞癌原位）', en: 'In situ lesion (Tis; AIS or SCIS)' });
        }
        if (state.ns.pathology === 'adenocarcinoma') {
          baseOptions.push({ value: 'T1mi', zh: '微浸润腺癌（T1mi）', en: 'Minimally invasive adenocarcinoma (T1mi)' });
        }
        if (!baseOptions.some(o => o.value === state.ns.specialT)) state.ns.specialT = '';
        effectiveField = { ...field, options: baseOptions, hint: { zh: 'T1mi 仅适用于符合定义的微浸润腺癌；Tis 需符合原位腺癌或原位鳞癌等病理定义。', en: 'T1mi is limited to minimally invasive adenocarcinoma; Tis requires appropriate in situ pathology such as AIS or SCIS.' } };
      }
      const wrap = document.createElement('div');
      wrap.className = 'field' + (effectiveField.full ? ' full' : '');
      const label = document.createElement('label');
      label.textContent = effectiveField.label[lang];
      wrap.appendChild(label);

      if (effectiveField.type === 'select') {
        const select = document.createElement('select');
        select.value = state[side][effectiveField.id] ?? '';
        effectiveField.options.forEach(opt => {
          const option = document.createElement('option');
          option.value = opt.value;
          option.textContent = opt[lang];
          if ((state[side][effectiveField.id] ?? '') === opt.value) option.selected = true;
          select.appendChild(option);
        });
        select.addEventListener('change', e => {
          state[side][effectiveField.id] = e.target.value;
          renderStatic();
        });
        wrap.appendChild(select);
      } else if (effectiveField.type === 'number') {
        const input = document.createElement('input');
        input.type = 'number';
        input.min = effectiveField.min;
        input.max = effectiveField.max;
        input.step = effectiveField.step;
        input.value = state[side][effectiveField.id];
        input.addEventListener('input', e => {
          state[side][effectiveField.id] = Number(e.target.value || 0);
          renderDynamic();
        });
        wrap.appendChild(input);
      } else if (effectiveField.type === 'chips') {
        const chips = document.createElement('div');
        chips.className = 'chips';
        effectiveField.chips.forEach(item => {
          const chip = document.createElement('div');
          chip.className = 'chip';
          chip.textContent = item[lang];
          chips.appendChild(chip);
        });
        wrap.appendChild(chips);
      }

      if (effectiveField.hint) {
        const hint = document.createElement('div');
        hint.className = 'hint';
        hint.textContent = effectiveField.hint[lang];
        wrap.appendChild(hint);
      }
      return wrap;
    }

    function renderSections(containerId, schema, side) {
      const container = $(containerId);
      container.innerHTML = '';
      schema.forEach(section => {
        const sec = document.createElement('details');
        sec.className = 'section-block';
        sec.open = true;
        const summary = document.createElement('summary');
        summary.className = 'section-summary';
        summary.innerHTML = `<span>${I18N[state.lang].sectionTitles[section.key]}</span><span class="section-toggle">${state.lang === 'zh' ? '点击展开 / 收起' : 'Click to expand / collapse'}</span>`;
        sec.appendChild(summary);
        const body = document.createElement('div');
        body.className = 'section-body';
        const grid = document.createElement('div');
        grid.className = 'form-grid';
        section.fields.forEach(field => grid.appendChild(renderField(field, side)));
        body.appendChild(grid);
        sec.appendChild(body);
        container.appendChild(sec);
      });
    }

    function renderStatic() {
      const t = I18N[state.lang];
      document.documentElement.lang = state.lang === 'zh' ? 'zh-CN' : 'en';
      document.title = state.lang === 'zh' ? '肺癌分期系统 · TNM第9版核校更新版' : 'Lung Cancer Staging System · TNM 9th Reviewed Update';
      $('heroBadge').textContent = t.heroBadge;
      $('printBtn').textContent = t.printButton;
      $('langSwitch').textContent = t.langButton;
      $('heroTitle').textContent = t.heroTitle;
      $('heroSubtitle').textContent = t.heroSubtitle;
      $('tabNsclc').textContent = t.tabNsclc;
      $('tabSclc').textContent = t.tabSclc;
      $('nsPanelTitle').textContent = t.nsPanelTitle;
      $('scPanelTitle').textContent = t.scPanelTitle;
      $('nsResultTag').textContent = t.nsResultTag;
      $('scResultTag').textContent = t.scResultTag;
      $('metricT').textContent = t.metricT;
      $('metricN').textContent = t.metricN;
      $('metricM').textContent = t.metricM;
      $('metricResect').textContent = t.metricResect;
      $('scMetricT').textContent = t.metricT;
      $('scMetricN').textContent = t.metricN;
      $('scMetricM').textContent = t.metricM;
      $('scMetricSimple').textContent = t.scMetricSimple;
      $('refsTitle').textContent = t.refsTitle;
      $('footerText').textContent = t.footerText;

      const infoGrid = $('infoGrid');
      infoGrid.innerHTML = '';
      t.infoCards.forEach(card => {
        const el = document.createElement('div');
        el.className = 'info-card';
        el.innerHTML = `<h3>${card.title}</h3><p>${card.body}</p>`;
        infoGrid.appendChild(el);
      });

      const refsList = $('refsList');
      refsList.innerHTML = '';
      REFERENCES.forEach(ref => {
        const li = document.createElement('li');
        li.innerHTML = `<a href="${ref.url}" target="_blank">${ref[state.lang]}</a>`;
        refsList.appendChild(li);
      });

      renderSections('nsSections', NS_SCHEMA, 'ns');
      renderSections('scSections', SC_SCHEMA, 'sc');
      renderDynamic();
    }

    function renderDynamic() {
      const t = I18N[state.lang];
      if (state.ns.n === 'N2') state.ns.n = 'N2a';
      if (state.sc.n === 'N2') state.sc.n = 'N2a';
      if (state.ns.m === 'M1c') state.ns.m = 'M1c1';
      if (state.sc.m === 'M1c') state.sc.m = 'M1c1';
      if (state.sc.specialT) state.sc.specialT = '';
      if (state.ns.specialT === 'T1mi' && state.ns.pathology !== 'adenocarcinoma') state.ns.specialT = '';
      if (state.ns.specialT === 'Tis' && !['adenocarcinoma', 'squamous'].includes(state.ns.pathology)) state.ns.specialT = '';
      const nsT = calcT(state.ns);
      const nsStage = computeStage(nsT.t, state.ns.n, state.ns.m);
      const nsSeverity = stageSeverity(nsStage);
      $('nsStage').textContent = nsStage;
      $('nsSummary').innerHTML = t.nsSummary(basisText('ns'), nsT.t, state.ns.n, state.ns.m, nsStage);
      $('nsTValue').textContent = nsT.t;
      $('nsNValue').textContent = state.ns.n;
      $('nsMValue').textContent = state.ns.m;
      $('nsResectValue').textContent = resectText();
      $('nsSeverityChip').textContent = t.severityLabels[nsSeverity];
      $('nsResultCard').className = `result-card stage-severity-${nsSeverity}`;
      $('nsReason').innerHTML = `<h3>${t.tReasonTitle}</h3>${nsT.reason}<br><br>${t.nsUpgradeNote}`;
      $('nsPlan').innerHTML = nsPlan(nsStage);
      $('nsFollow').innerHTML = nsFollow(nsStage);
      renderSummaryStrip('nsCaseSummary', [
        { label: t.summaryLabels.pathology, value: pathologyText('ns') },
        { label: t.summaryLabels.basis, value: basisText('ns') },
        { label: t.summaryLabels.stage, value: nsStage },
        { label: t.summaryLabels.ecog, value: state.ns.ecog },
        { label: t.summaryLabels.driver, value: driverText() },
        { label: t.summaryLabels.pdl1, value: pdl1Text() }
      ]);

      const scT = calcT(state.sc);
      const scStage = computeStage(scT.t, state.sc.n, state.sc.m);
      const simple = simpleSclcStage();
      const scSeverity = stageSeverity(scStage);
      $('scStage').textContent = scStage;
      $('scSummary').innerHTML = t.scSummary(basisText('sc'), scT.t, state.sc.n, state.sc.m, scStage, simple);
      $('scTValue').textContent = scT.t;
      $('scNValue').textContent = state.sc.n;
      $('scMValue').textContent = state.sc.m;
      $('scSimpleValue').textContent = simple;
      $('scSeverityChip').textContent = t.severityLabels[scSeverity];
      $('scResultCard').className = `result-card stage-severity-${scSeverity}`;
      $('scReason').innerHTML = `<h3>${t.tReasonTitle}</h3>${scT.reason}<br><br>${t.scUpgradeNote}`;
      $('scPlan').innerHTML = scPlan(scStage, simple);
      $('scFollow').innerHTML = scFollow(simple);
      renderSummaryStrip('scCaseSummary', [
        { label: t.summaryLabels.pathology, value: pathologyText('sc') },
        { label: t.summaryLabels.basis, value: basisText('sc') },
        { label: t.summaryLabels.stage, value: scStage },
        { label: t.summaryLabels.simple, value: simple },
        { label: t.summaryLabels.ecog, value: state.sc.ecog },
        { label: t.summaryLabels.brain, value: brainText() }
      ]);
    }

    $('langSwitch').addEventListener('click', () => {
      state.lang = state.lang === 'zh' ? 'en' : 'zh';
      localStorage.setItem('lung-staging-lang', state.lang);
      renderStatic();
    });

    $('printBtn').addEventListener('click', () => {
      window.print();
    });

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        state.tab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`page-${state.tab}`).classList.add('active');
      });
    });

    renderStatic();
  </script>
</body>
</html>
